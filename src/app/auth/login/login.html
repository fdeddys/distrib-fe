<div class="min-h-screen bg-slate-50 flex items-center justify-center p-6 font-sans">
  
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
    
    <!-- Header/Logo Area -->
    <div class="bg-apotik-main p-8 text-center text-white relative overflow-hidden">
      <!-- Decorative circles -->
      <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full"></div>
      <div class="absolute -bottom-10 -left-10 w-24 h-24 bg-white/10 rounded-full"></div>
      
      <div class="relative z-10 flex flex-col items-center gap-4">
        <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-apotik-main text-3xl font-bold shadow-lg">
          +
        </div>
        <div>
          <h2 class="text-2xl font-bold tracking-tight">Apotik Modern</h2>
          <p class="text-sky-100 text-xs mt-1 uppercase tracking-widest font-medium">Management System v1.0</p>
        </div>
      </div>
    </div>

    <!-- Form Area -->
    <div class="p-8 space-y-6">
      
      <div class="text-center space-y-1">
        <h3 class="text-xl font-bold text-slate-800">Silakan Login</h3>
        <p class="text-sm text-slate-400">Gunakan akun admin untuk akses sistem</p>
      </div>

      <div class="space-y-4">
        <!-- User -->
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Username</label>
          <div class="relative">
            <span class="absolute left-4 top-3.5 text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </span>
            <input type="text" [(ngModel)]="username" placeholder="admin"
                   class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:ring-4 focus:ring-blue-100 focus:bg-white outline-none transition-all">
          </div>
        </div>

        <!-- Pass -->
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">Password</label>
          <div class="relative">
            <span class="absolute left-4 top-3.5 text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2-2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </span>
            <input type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="onLogin()"
                   class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:ring-4 focus:ring-blue-100 focus:bg-white outline-none transition-all">
          </div>
        </div>
      </div>

      <!-- Action -->
      <button (click)="onLogin()" [disabled]="isLoading"
              class="w-full py-4 bg-apotik-main text-white rounded-2xl font-bold shadow-lg shadow-apotik-main/30 hover:bg-sky-600 hover:shadow-xl hover:translate-y-[-1px] active:scale-95 transition-all disabled:opacity-50 disabled:translate-y-0">
        {{ isLoading ? 'Memproses...' : 'LOGIN KE SISTEM' }}
      </button>

      <div class="pt-4 text-center">
        <p class="text-xs text-slate-400">Lupa password? Hubungi Administrator TI.</p>
      </div>

    </div>

  </div>

</div>
