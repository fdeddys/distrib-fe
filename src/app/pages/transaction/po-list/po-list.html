<div class="h-full space-y-4">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Purchase Order</h1>
      <p class="text-sm text-slate-500">Daftar transaksi pemesanan barang</p>
    </div>
    <button (click)="onNew()" class="px-5 py-2.5 bg-indigo-600 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      Buat PO Baru
    </button>
  </div>

  <!-- Advanced Filter Section -->
  <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 grid grid-cols-6 gap-4 items-end">
    <div class="flex flex-col gap-1.5 col-span-1">
      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Periode Awal</label>
      <input type="date" [(ngModel)]="startDate" class="w-full px-4 py-2 bg-slate-50 border border-slate-100 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-100 font-bold">
    </div>
    <div class="flex flex-col gap-1.5 col-span-1">
      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Periode Akhir</label>
      <input type="date" [(ngModel)]="endDate" class="w-full px-4 py-2 bg-slate-50 border border-slate-100 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-100 font-bold">
    </div>
    <div class="flex flex-col gap-1.5 col-span-2">
      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Supplier Name</label>
      <input type="text" [(ngModel)]="supplierSearch" placeholder="Ketik nama supplier..." 
             class="w-full px-4 py-2 border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-100 transition-all font-bold">
    </div>
    <div class="flex flex-col gap-1.5 col-span-1">
      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Status</label>
      <select [(ngModel)]="statusSearch" 
              class="w-full px-4 py-2 border border-slate-200 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-100 appearance-none cursor-pointer bg-white font-bold text-slate-600">
        <option value="">Semua Status</option>
        <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
      </select>
    </div>
    <div class="flex gap-2 col-span-1">
      <!-- Search Button -> Warna Merah (Rose) -->
      <button (click)="onSearch()" class="flex-1 py-2 bg-rose-600 text-white text-[10px] font-black uppercase tracking-widest hover:bg-rose-700 rounded-xl transition-all shadow-lg shadow-rose-100 flex items-center justify-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          Search
      </button>
      <button (click)="resetFilter()" class="py-2 px-3 bg-slate-100 text-slate-500 text-[10px] font-black uppercase tracking-widest hover:bg-slate-200 rounded-xl transition-all" title="Reset">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
      </button>
    </div>
  </div>

  <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-indigo-50/30 border-b border-indigo-100">
        <tr class="text-[10px] font-black text-indigo-600 uppercase tracking-widest">
          <th class="px-8 py-5">PO Number</th>
          <th class="px-8 py-5">Supplier</th>
          <th class="px-8 py-5">Created</th>
          <th class="px-8 py-5 text-right">Grand Total</th>
          <th class="px-8 py-5 text-center">Status</th>
          <th class="px-8 py-5 text-center">Action</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-50">
        <tr *ngFor="let po of filteredList" class="hover:bg-slate-50/50 transition-all group">
          <td class="px-8 py-5 text-sm font-black text-blue-600 select-all hover:underline cursor-pointer">{{ po.poNumber }}</td>
          <td class="px-8 py-5">
             <div class="text-xs font-black text-slate-700 uppercase tracking-tight">{{ po.supplierName }}</div>
             <div class="text-[9px] font-bold text-slate-400">{{ po.warehouseName }}</div>
          </td>
          <td class="px-8 py-5 text-[11px] text-slate-500 font-bold italic">{{ po.poCreated | date:'dd/MM/yyyy' }}</td>
          <td class="px-8 py-5 text-right text-sm font-black text-slate-800">
             <span class="text-[10px] text-slate-400 mr-1 font-normal">Rp</span>{{ po.grandTotal | number }}
          </td>
          <td class="px-8 py-5 text-center">
            <span [class]="'px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest border shadow-sm ' + getStatusClass(po.status)">
              {{ po.status }}
            </span>
          </td>
          <td class="px-8 py-5 text-center">
             <div class="flex justify-center gap-2">
               <!-- Preview -> Printer, Emerald -->
               <button title="Print PO" (click)="onPreview(po.id)" class="p-2 text-slate-300 hover:text-emerald-500 hover:bg-emerald-50 rounded-xl transition-all">
                 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
               </button>
               <!-- Edit -> Pencil, Amber -->
               <button title="Edit PO" (click)="onEdit(po.id)" class="p-2 text-slate-300 hover:text-amber-500 hover:bg-amber-50 rounded-xl transition-all">
                 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
               </button>
             </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
