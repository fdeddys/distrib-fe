<div class="h-full flex flex-col space-y-4">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Master Product</h1>
      <p class="text-sm text-slate-500">Kelola data perbekalan farmasi dan obat-obatan</p>
    </div>
  </div>

  <div class="flex flex-col flex-1 space-y-4">
    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-wrap gap-4 items-center justify-between">
      <div class="flex gap-2">
        <button (click)="onNew()" class="px-4 py-2 bg-apotik-main text-white rounded-xl text-sm font-semibold hover:bg-sky-600 transition-all flex items-center gap-2 shadow-lg shadow-apotik-main/20">
           <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
           New Product
        </button>
        <button (click)="onPrint()" class="px-4 py-2 border border-slate-200 text-slate-600 rounded-xl text-sm font-semibold hover:bg-slate-50 transition-all flex items-center gap-2">
           <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
           Print
        </button>
      </div>

      <div class="flex gap-3 flex-1 max-w-xl">
        <div class="relative flex-1">
          <input type="text" [(ngModel)]="filterName" (input)="applyFilter()" placeholder="Cari nama produk..." 
                 class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-100 outline-none transition-all">
          <svg class="w-4 h-4 absolute left-3.5 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
        <select [(ngModel)]="filterStatus" (change)="applyFilter()"
                class="px-4 py-2 border border-slate-200 rounded-xl text-sm text-slate-600 outline-none focus:ring-2 focus:ring-blue-100 cursor-pointer">
          <option value="">Semua Status</option>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>
    </div>

    <!-- Grid -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex-1">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-50/50 border-b border-slate-100">
            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">No.</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Kode</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Nama Product</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Status</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest text-center">Aksi</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50">
          <tr *ngFor="let p of paginatedProducts; let i = index" class="hover:bg-slate-50/80 transition-colors group">
            <td class="px-6 py-4 text-sm text-slate-500">{{ (currentPage - 1) * pageSize + i + 1 }}</td>
            <td class="px-6 py-4 text-sm font-semibold text-slate-700">{{ p.code }}</td>
            <td class="px-6 py-4 text-sm text-slate-600">{{ p.name }}</td>
            <td class="px-6 py-4">
              <span [class]="p.status === 'Active' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-red-50 text-red-600 border-red-100'"
                    class="px-2.5 py-1 rounded-lg text-[10px] font-bold border uppercase tracking-wider">
                {{ p.status }}
              </span>
            </td>
            <td class="px-6 py-4 text-center">
              <div class="flex items-center justify-center gap-2">
                <button (click)="onEdit(p.id)" class="p-2 text-slate-400 hover:text-apotik-main hover:bg-blue-50 rounded-lg transition-all" title="Edit">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                </button>
                <button (click)="onDelete(p.id)" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all" title="Hapus">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="paginatedProducts.length === 0">
            <td colspan="5" class="px-6 py-12 text-center text-slate-400 italic font-medium">Data tidak ditemukan...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Paging -->
    <div class="flex items-center justify-between px-2">
      <p class="text-xs text-slate-500">Showing page {{ currentPage }} of {{ totalPages || 1 }}</p>
      <div class="flex gap-2">
        <button (click)="currentPage = currentPage - 1" [disabled]="currentPage === 1"
                class="p-2 border border-slate-200 rounded-lg hover:bg-white disabled:opacity-30 disabled:cursor-not-allowed transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <button (click)="currentPage = currentPage + 1" [disabled]="currentPage === totalPages || totalPages === 0"
                class="p-2 border border-slate-200 rounded-lg hover:bg-white disabled:opacity-30 disabled:cursor-not-allowed transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>
      </div>
    </div>
  </div>
</div>
