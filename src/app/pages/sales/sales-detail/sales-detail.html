<div class="h-full space-y-4">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold text-slate-800">{{ isEdit ? 'Edit Sales' : 'Tambah Sales' }}</h1>
    <button (click)="onBack()" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl text-sm font-semibold hover:bg-slate-200">Batal</button>
  </div>

  <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 max-w-2xl mx-auto w-full">
    <div class="space-y-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Sales Code</label>
        <input type="text" [(ngModel)]="current.code" placeholder="AUTO" readonly class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm">
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Nama Lengkap</label>
          <input type="text" [(ngModel)]="current.name" placeholder="misal: Andi Pratama" class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 outline-none transition-all">
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Jenis Kelamin</label>
          <select [(ngModel)]="current.gender" class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 outline-none transition-all appearance-none cursor-pointer">
            <option value="">Pilih...</option>
            <option *ngFor="let g of genderOptions" [value]="g.code">{{ g.name }}</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">No. Telepon</label>
          <input type="text" [(ngModel)]="current.phone" placeholder="08xxxxxxxxxx" class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 outline-none transition-all">
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Email</label>
          <input type="email" [(ngModel)]="current.email" placeholder="andi@mail.com" class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 outline-none transition-all">
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Status</label>
        <div class="flex gap-2">
           <button (click)="current.active = true" [class]="current.active ? 'px-4 py-2 bg-emerald-50 text-emerald-600 rounded-xl text-xs font-bold' : 'px-4 py-2 text-slate-400 text-xs font-bold'">Active</button>
           <button (click)="current.active = false" [class]="!current.active ? 'px-4 py-2 bg-rose-50 text-rose-600 rounded-xl text-xs font-bold' : 'px-4 py-2 text-slate-400 text-xs font-bold'">Inactive</button>
        </div>
      </div>

      <div class="pt-6">
        <button (click)="onSave()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all uppercase tracking-widest text-sm">Simpan Data Sales</button>
      </div>
    </div>
  </div>
</div>
