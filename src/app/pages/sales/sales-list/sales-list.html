<div class="h-full flex flex-col space-y-4">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Master Sales</h1>
      <p class="text-sm text-slate-500">Kelola data tenaga penjualan / salesman</p>
    </div>
  </div>

  <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
    <button (click)="onNew()" class="px-4 py-2 bg-apotik-main text-white rounded-xl text-sm font-semibold hover:bg-sky-600 shadow-lg shadow-apotik-main/20">
      + New Sales
    </button>
    <div class="relative w-64">
      <input type="text" [(ngModel)]="filterName" (input)="applyFilter()" placeholder="Cari nama sales..." 
             class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl text-sm focus:ring-4 focus:ring-blue-50 outline-none transition-all">
      <svg class="w-4 h-4 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex-1">
    <table class="w-full text-left">
      <thead class="bg-slate-50 border-b border-slate-100">
        <tr class="text-xs font-bold text-slate-400 uppercase tracking-widest">
          <th class="px-6 py-4">Kode</th>
          <th class="px-6 py-4">Nama Lengkap</th>
          <th class="px-6 py-4">Phone</th>
          <th class="px-6 py-4 text-center">Status</th>
          <th class="px-6 py-4 text-center">Aksi</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-50">
        <tr *ngFor="let s of paginated" class="hover:bg-slate-50/50 transition-all group">
          <td class="px-6 py-4 text-sm font-mono text-slate-500">{{ s.code }}</td>
          <td class="px-6 py-4 text-sm font-bold text-slate-700">{{ s.name }}</td>
          <td class="px-6 py-4 text-sm text-slate-500">{{ s.phone }}</td>
          <td class="px-6 py-4 text-center">
            <span [class]="s.active ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-red-50 text-red-600 border-red-100'"
                  class="px-2 py-0.5 rounded-lg text-[10px] font-bold border uppercase">
              {{ s.active ? 'Active' : 'Inactive' }}
            </span>
          </td>
          <td class="px-6 py-4 text-center">
            <div class="flex justify-center gap-2">
              <button (click)="onEdit(s.id)" class="p-2 text-slate-400 hover:text-apotik-main"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>
              <button (click)="onDelete(s.id)" class="p-2 text-slate-400 hover:text-red-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
