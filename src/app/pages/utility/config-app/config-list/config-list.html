<div class="h-full space-y-4">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Configuration Master</h1>
      <p class="text-sm text-slate-500">Pilih master data yang ingin dikonfigurasi</p>
    </div>
  </div>

  <!-- Search Area (Mirip Master Product) -->
  <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex items-center justify-between">
    <div class="relative w-72">
      <input type="text" [(ngModel)]="search" (input)="applyFilter()" placeholder="Search master name..." 
             class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 outline-none transition-all">
      <svg class="w-4 h-4 absolute left-3.5 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
    </div>
    <!-- No Add Button (Sesuai request) -->
  </div>

  <!-- Grid List (Master side) -->
  <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-slate-50 border-b border-slate-100">
        <tr class="text-xs font-bold text-slate-400 uppercase tracking-widest">
          <th class="px-8 py-5">Config Name</th>
          <th class="px-8 py-5">Description</th>
          <th class="px-8 py-5 text-center">Action</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-50">
        <tr *ngFor="let c of filtered" class="hover:bg-indigo-50/30 transition-all group cursor-pointer" (click)="onSelect(c.id)">
          <td class="px-8 py-5 text-sm font-bold text-slate-700">{{ c.name }}</td>
          <td class="px-8 py-5 text-sm text-slate-500">{{ c.description }}</td>
          <td class="px-8 py-5 text-center">
            <button class="px-4 py-1.5 bg-indigo-50 text-indigo-600 rounded-xl text-[10px] font-black uppercase hover:bg-indigo-600 hover:text-white transition-all">
              Manage Details
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
