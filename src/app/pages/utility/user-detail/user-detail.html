<div class="h-full space-y-4">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold text-slate-800 tracking-tight">{{ isEdit ? 'Edit Akun Pengguna' : 'Buat Akun Baru' }}</h1>
    <button (click)="onBack()" class="px-5 py-2 border border-slate-200 text-slate-600 rounded-2xl text-sm font-semibold hover:bg-slate-50 transition-all flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7 7-7m3 14l-7-7 7-7"></path></svg>
      Batal & Kembali
    </button>
  </div>

  <div class="bg-white p-10 rounded-3xl shadow-sm border border-slate-100 flex flex-col grow max-w-2xl mx-auto w-full">
    <div class="space-y-8">
      
      <div class="grid grid-cols-2 gap-8">
        <div class="flex flex-col gap-2">
          <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Username / Account ID</label>
          <input type="text" [(ngModel)]="current.username" placeholder="sys_admin" 
                 class="w-full px-5 py-3.5 border border-slate-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 outline-none transition-all font-semibold">
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Akses Role</label>
          <select [(ngModel)]="current.role" class="w-full px-5 py-3.5 border border-slate-200 rounded-2xl text-sm outline-none focus:ring-4 focus:ring-indigo-50 transition-all font-semibold cursor-pointer">
            <option value="Admin">System Administrator</option>
            <option value="Pharmacist">Pharmacist (Apoteker)</option>
            <option value="Cashier">Cashier (Kasir)</option>
          </select>
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Nama Lengkap Sesuai KTP</label>
        <input type="text" [(ngModel)]="current.fullName" placeholder="Andi Gunawan, Amd. Farm..." 
               class="w-full px-5 py-3.5 border border-slate-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 outline-none transition-all">
      </div>

      <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-between">
        <div>
          <h4 class="text-sm font-bold text-slate-700">Status Akun</h4>
          <p class="text-xs text-slate-400 mt-0.5">Akun yang dinonaktifkan tidak dapat masuk ke sistem.</p>
        </div>
        <div class="relative inline-flex items-center cursor-pointer">
           <input type="checkbox" [(ngModel)]="current.active" class="sr-only peer">
           <div (click)="current.active = !current.active" class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
        </div>
      </div>

      <div class="pt-8 border-t border-slate-50">
        <button (click)="onSave()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-sm tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700 hover:shadow-2xl hover:translate-y-[-2px] active:scale-95 transition-all uppercase">
          Simpan & Tetapkan Akses
        </button>
      </div>

    </div>
  </div>
</div>
