<div class="h-full space-y-4">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">User Management</h1>
      <p class="text-sm text-slate-500">Kelola akses akun dan role pengguna sistem</p>
    </div>
  </div>

  <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
    <button (click)="onNew()" class="px-5 py-2.5 bg-indigo-600 text-white rounded-2xl text-sm font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
      Tambah User Baru
    </button>
    <div class="relative w-72">
      <input type="text" [(ngModel)]="search" (input)="applyFilter()" placeholder="Cari username atau nama..." 
             class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 outline-none transition-all">
      <svg class="w-4 h-4 absolute left-3.5 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
    </div>
  </div>

  <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-slate-50/50 border-b border-slate-50">
        <tr class="text-xs font-bold text-slate-400 uppercase tracking-widest">
          <th class="px-8 py-5">User Account</th>
          <th class="px-8 py-5">Full Name</th>
          <th class="px-8 py-5">Role Access</th>
          <th class="px-8 py-5 text-center">Security</th>
          <th class="px-8 py-5 text-center">Aksi</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-50">
        <tr *ngFor="let u of filteredUsers" class="hover:bg-slate-50/30 transition-all group">
          <td class="px-8 py-5">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600 font-bold text-xs uppercase">
                {{ u.username.substring(0,2) }}
              </div>
              <div>
                <p class="text-sm font-bold text-slate-700 tracking-tight">{{ u.username }}</p>
                <p class="text-[10px] text-slate-400 font-mono italic">ID: #{{ u.id }}</p>
              </div>
            </div>
          </td>
          <td class="px-8 py-5 text-sm text-slate-600 font-medium">{{ u.fullName }}</td>
          <td class="px-8 py-5">
            <span [class]="u.role === 'Admin' ? 'bg-purple-50 text-purple-600 border-purple-100' : (u.role === 'Pharmacist' ? 'bg-sky-50 text-sky-600 border-sky-100' : 'bg-amber-50 text-amber-600 border-amber-100')"
                  class="px-3 py-1 rounded-full text-[10px] font-black border uppercase tracking-wider">
              {{ u.role }}
            </span>
          </td>
          <td class="px-8 py-5 text-center">
            <span [class]="u.active ? 'text-emerald-500' : 'text-slate-300'" class="inline-flex items-center gap-1.5 text-xs font-bold">
              <span class="w-1.5 h-1.5 rounded-full bg-current"></span>
              {{ u.active ? 'Active' : 'Locked' }}
            </span>
          </td>
          <td class="px-8 py-5 text-center">
             <div class="flex justify-center gap-1">
               <button (click)="onEdit(u.id)" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all">
                 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
               </button>
               <button (click)="onDelete(u.id)" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all">
                 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
               </button>
             </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
