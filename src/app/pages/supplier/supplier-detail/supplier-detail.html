<div class="h-full flex flex-col space-y-4">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">
        {{ isEdit ? 'Edit Supplier' : 'Tambah Supplier Baru' }}
      </h1>
      <p class="text-sm text-slate-500">Formulir detail data pemasok/supplier</p>
    </div>
  </div>

  <div class="flex flex-col flex-1">
    <div class="bg-white p-4 rounded-t-2xl border border-slate-100 flex items-center justify-between shadow-sm">
      <div class="flex gap-2">
        <button (click)="onNew()" class="px-5 py-2 bg-slate-100 text-slate-600 rounded-xl text-sm font-semibold hover:bg-slate-200 transition-all">New</button>
        <button (click)="onSave()" class="px-5 py-2 bg-emerald-500 text-white rounded-xl text-sm font-semibold hover:bg-emerald-600 shadow-lg shadow-emerald-500/20 transition-all flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
          Save Data
        </button>
      </div>
      <button (click)="onBack()" class="px-5 py-2 border border-slate-200 text-slate-600 rounded-xl text-sm font-semibold hover:bg-slate-50 transition-all flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7 7-7m3 14l-7-7 7-7"></path></svg>
        Back to List
      </button>
    </div>

    <div class="bg-white p-8 rounded-b-2xl border border-t-0 border-slate-100 shadow-sm grow overflow-y-auto">
      <div class="max-w-4xl space-y-8">
        
        <!-- Info Utama -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">ID System</label>
            <input type="text" [value]="currentSupplier.id || 'AUTO'" disabled class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-400 font-mono outline-none">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Kode Supplier</label>
            <input type="text" [(ngModel)]="currentSupplier.code" placeholder="Misal: SUP-001" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-4 focus:ring-blue-50 outline-none transition-all">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Status Active</label>
            <select [(ngModel)]="currentSupplier.active" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-4 focus:ring-blue-50 outline-none transition-all cursor-pointer">
              <option [ngValue]="true">Active</option>
              <option [ngValue]="false">Inactive</option>
            </select>
          </div>
        </div>

        <!-- Nama & Contact Person -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Nama Perusahaan / Supplier</label>
            <input type="text" [(ngModel)]="currentSupplier.nama" placeholder="Masukkan nama PT / Perusahaan..." class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm font-semibold focus:ring-4 focus:ring-blue-50 outline-none transition-all">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Contact Person</label>
            <input type="text" [(ngModel)]="currentSupplier.contactPerson" placeholder="Nama PIC / Sales..." class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-4 focus:ring-blue-50 outline-none transition-all">
          </div>
        </div>

        <!-- Kontak -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Email</label>
            <input type="email" [(ngModel)]="currentSupplier.email" placeholder="example@mail.com" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-4 focus:ring-blue-50 outline-none transition-all">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">No. Telp Kantor</label>
            <input type="text" [(ngModel)]="currentSupplier.contact" placeholder="021-xxxxxx" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-4 focus:ring-blue-50 outline-none transition-all">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">No. HP / WhatsApp</label>
            <input type="text" [(ngModel)]="currentSupplier.hp" placeholder="08xxxxxxxxx" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-4 focus:ring-blue-50 outline-none transition-all">
          </div>
        </div>

        <!-- Alamat & Payment -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="md:col-span-2 flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Alamat Lengkap</label>
            <input type="text" [(ngModel)]="currentSupplier.alamat" placeholder="Jl. Raya Nomor..." class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-4 focus:ring-blue-50 outline-none transition-all">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Term Of Payment (Days)</label>
            <div class="relative">
              <input type="number" [(ngModel)]="currentSupplier.top" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-4 focus:ring-blue-50 outline-none transition-all">
              <span class="absolute right-4 top-3 text-slate-400 text-xs font-bold">Hari</span>
            </div>
          </div>
        </div>

        <!-- Warning Area -->
        <div class="bg-amber-50 border border-amber-100 p-4 rounded-xl flex gap-3 mt-4">
           <svg class="w-5 h-5 text-amber-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
           <p class="text-[11px] text-amber-700 leading-relaxed italic">Catatan: Alamat dan nomor kontak sangat penting untuk proses pembuatan Purchase Order (PO) otomatis kelak. Pastikan data valid.</p>
        </div>

      </div>
    </div>
  </div>
</div>
