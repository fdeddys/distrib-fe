<div class="h-full space-y-4">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold text-slate-800">{{ isEdit ? 'Edit Gudang' : 'Tambah Gudang Baru' }}</h1>
    <button (click)="onBack()" class="px-5 py-2.5 bg-slate-100 text-slate-500 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-200 transition-all flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Batal
    </button>
  </div>

  <div class="bg-white p-10 rounded-3xl shadow-sm border border-slate-100 max-w-2xl mx-auto w-full">
    <div class="space-y-8">
      <div class="grid grid-cols-2 gap-6">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Warehouse Code</label>
          <input type="text" [(ngModel)]="current.code" placeholder="misal: GUT" class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 outline-none transition-all font-mono font-bold">
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Warehouse Name</label>
          <input type="text" [(ngModel)]="current.name" placeholder="misal: Gudang Utama" class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:ring-4 focus:ring-indigo-50 outline-none transition-all font-bold">
        </div>
      </div>

      <!-- Logic Flags Section -->
      <div class="grid grid-cols-2 gap-4">
        <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-between">
           <div>
             <h4 class="text-xs font-black text-slate-700 uppercase tracking-wider">Gudang Penerimaan</h4>
             <p class="text-[9px] text-slate-500">Dapat menerima barang dari PO/Supplier</p>
           </div>
           <label class="relative inline-flex items-center cursor-pointer">
             <input type="checkbox" [(ngModel)]="current.warehouse_in" class="sr-only peer">
             <div class="w-10 h-5 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-emerald-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all"></div>
           </label>
        </div>
        
        <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-between">
           <div>
             <h4 class="text-xs font-black text-slate-700 uppercase tracking-wider">Gudang Penjualan</h4>
             <p class="text-[9px] text-slate-500">Dapat mengeluarkan barang untuk Sales/POS</p>
           </div>
           <label class="relative inline-flex items-center cursor-pointer">
             <input type="checkbox" [(ngModel)]="current.warehouse_out" class="sr-only peer">
             <div class="w-10 h-5 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-orange-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all"></div>
           </label>
        </div>
      </div>

      <div class="flex justify-between items-center pt-8 border-t border-slate-50">
        <div class="flex gap-2 p-1.5 bg-slate-100 rounded-2xl">
          <button (click)="current.status = true" [class]="current.status ? 'px-4 py-2 bg-white shadow-sm rounded-xl text-[10px] font-black text-emerald-600' : 'px-4 py-2 text-[10px] font-bold text-slate-400'">ACTIVE</button>
          <button (click)="current.status = false" [class]="!current.status ? 'px-4 py-2 bg-white shadow-sm rounded-xl text-[10px] font-black text-rose-600' : 'px-4 py-2 text-[10px] font-bold text-slate-400'">INACTIVE</button>
        </div>
        <button (click)="onSave()" class="px-10 py-3.5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all uppercase tracking-widest text-xs flex items-center gap-2">
           <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
           Simpan Gudang
        </button>
      </div>
    </div>
  </div>
</div>
