<div class="h-full space-y-4">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Master Warehouse</h1>
      <p class="text-sm text-slate-500">Kelola daftar gudang (Multi-Warehouse Support)</p>
    </div>
    <button (click)="onNew()" class="px-5 py-2.5 bg-indigo-600 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      New Warehouse
    </button>
  </div>

  <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-slate-50 border-b border-slate-100">
        <tr class="text-xs font-bold text-slate-400 uppercase tracking-widest">
          <th class="px-8 py-5">Code</th>
          <th class="px-8 py-5">Warehouse Name</th>
          <th class="px-8 py-5 text-center">Type</th>
          <th class="px-8 py-5 text-center">Status</th>
          <th class="px-8 py-5 text-center">Action</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-50">
        <tr *ngFor="let w of list" class="hover:bg-slate-50/50 transition-all group">
          <td class="px-8 py-5 text-xs font-mono font-bold text-indigo-600">{{ w.code }}</td>
          <td class="px-8 py-5 text-sm font-bold text-slate-700">{{ w.name }}</td>
          <td class="px-8 py-5 text-center">
             <div class="flex justify-center gap-2">
               <span *ngIf="w.warehouse_in" class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-lg text-[9px] font-black tracking-widest border border-emerald-100">IN</span>
               <span *ngIf="w.warehouse_out" class="px-3 py-1 bg-orange-50 text-orange-600 rounded-lg text-[9px] font-black tracking-widest border border-orange-100">OUT</span>
             </div>
          </td>
          <td class="px-8 py-5 text-center">
            <span [class]="w.status ? 'text-emerald-500 bg-emerald-50 px-3 py-1 rounded-lg text-[10px] font-black' : 'text-rose-500 bg-rose-50 px-3 py-1 rounded-lg text-[10px] font-black'">
              {{ w.status ? 'ACTIVE' : 'INACTIVE' }}
            </span>
          </td>
          <td class="px-8 py-5 text-center">
             <div class="flex justify-center gap-2">
               <button (click)="onEdit(w.id)" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all">
                 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
               </button>
               <button (click)="onDelete(w.id)" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all">
                 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
               </button>
             </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
