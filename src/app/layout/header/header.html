<header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
  <div class="flex items-center gap-3">
    <div class="h-8 w-8 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-500">
      {{ authService.getRole().charAt(0) }}
    </div>
    <div>
      <h2 class="text-sm font-bold text-slate-800 leading-none">{{ authService.getUserName() }}</h2>
      <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mt-1">{{ authService.getRole() }}</p>
    </div>
  </div>

  <div class="flex items-center gap-4">
    <button (click)="onChangePassword()" class="text-sm font-semibold text-slate-600 hover:text-apotik-main transition-colors">Change Password</button>
    <div class="h-4 w-px bg-slate-300"></div>
    <button (click)="onLogout()" class="text-sm font-semibold text-red-500 hover:text-red-700 transition-colors flex items-center gap-1.5">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
      Logout
    </button>
  </div>
</header>
